<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b0d" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gospel Path" />
  <title>Gospel Path</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app" id="app">
  <header class="topbar">
    <div class="brand">
      <div class="logo">GP</div>
      <div><h1 class="brand-title">Gospel Path</h1><p class="brand-sub">Songs · Path · Chord Lab · Licks · Shout · Organ · Live</p></div>
    </div>
    <nav class="tabs top-tabs" id="topTabs"></nav>
    <div class="top-actions">
      <button class="icon-btn" onclick="toggleTheme()" aria-label="Toggle theme">◐</button>
      <button class="icon-btn desktop-only" onclick="openSettings()" aria-label="Settings">⚙</button>
    </div>
  </header>

  <main class="page" id="page"></main>

  <nav class="bottom-nav" id="bottomNav"></nav>

  <section class="peek" id="peek" aria-label="Chord fingering peek"></section>

  <div class="sheet-backdrop" id="sheetBackdrop" onclick="closeSheet()"></div>
  <section class="sheet" id="sheet"></section>

  <div class="toast" id="toast"></div>
</div>
<script src="music-engine.js"></script>
<script src="app.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
  }
</script>
</body>
</html>
